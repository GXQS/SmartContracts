name: benchmarks
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  bench:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./benchmarks -bench=. -run ^$
